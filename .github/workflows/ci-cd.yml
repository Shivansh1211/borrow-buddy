name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run Frontend Tests
        run: npm run test

      - name: Build Frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm run test

  deploy:
    needs: [test-and-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Deploy to Render (Frontend & Backend)
        run: |
          echo "Deploying to Render..."
          echo "To enable automatic deployment, make sure you configure the following GitHub Secrets:"
          echo " - RENDER_DEPLOY_HOOK_FRONTEND"
          echo " - RENDER_DEPLOY_HOOK_BACKEND"
          
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            echo "Triggering frontend deployment..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          else
            echo "RENDER_DEPLOY_HOOK_FRONTEND secret not found. Skipping frontend deploy trigger."
          fi
          
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            echo "Triggering backend deployment..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          else
            echo "RENDER_DEPLOY_HOOK_BACKEND secret not found. Skipping backend deploy trigger."
          fi
